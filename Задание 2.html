<!DOCTYPE html>
<html>
   <head>
       <meta charset="UTF-8">  
       <title>Задание 2</title>
   </head>
   <body>
    <script>   
      alert('Задание 2. Составить алгоритм: если введенное имя совпадает с Вячеслав, то вывести “Привет, Вячеслав”, если нет, то вывести "Нет такого имени"')
    let yourName = prompt('Введите Имя');
      if (yourName == 'Вячеслав') {
	    alert ('Привет, Вячеслав');
    } else if (yourName == '') {
        alert ('Нужно ввести имя'); 
    } else if (yourName != 'Вячеслав') {
        alert ('Нет такого имени');	
    }
    </script>
   </body>
</html>
