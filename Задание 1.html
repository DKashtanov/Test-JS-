<!DOCTYPE html>
<html>
   <head>
       <meta charset="UTF-8">  
       <title>Задание 1</title>
   </head>
   <body>
    <script>   
    alert('Задание 1. Составить алгоритм: если введенное число больше 7, то вывести “Привет”') 
   let yourNomber = prompt('Введите число');
	  if (yourNomber > 7) {
		alert ('Привет!');
	} else  if (yourNomber <= 7) {
    	alert ('Попробуйте снова');	
	} else {
		alert ('Нужно ввести число');
	}
    </script>
   </body>
</html>
